<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0d0b08"/>

  <!-- Outer circle of film roll -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#c8841a" stroke-width="2.5"/>

  <!-- Inner circle (hub) -->
  <circle cx="16" cy="16" r="5" fill="#c8841a"/>

  <!-- Center hole -->
  <circle cx="16" cy="16" r="2" fill="#0d0b08"/>

  <!-- Sprocket holes around the roll — 6 evenly spaced -->
  <circle cx="16" cy="5"  r="1.5" fill="#0d0b08"/>
  <circle cx="24.6" cy="10.5" r="1.5" fill="#0d0b08"/>
  <circle cx="24.6" cy="21.5" r="1.5" fill="#0d0b08"/>
  <circle cx="16" cy="27"  r="1.5" fill="#0d0b08"/>
  <circle cx="7.4" cy="21.5" r="1.5" fill="#0d0b08"/>
  <circle cx="7.4" cy="10.5" r="1.5" fill="#0d0b08"/>
</svg>